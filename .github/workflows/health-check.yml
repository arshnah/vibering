name: ring health check

# Pings every member site on a schedule. Writes status.json (published to the
# `status` branch so the homepage can show live up/down dots), and opens/updates
# an issue when any site is down — closing it when everything is back up.

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday, 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const members = JSON.parse(fs.readFileSync("webring.json", "utf8"));
            const marker = "<!-- ring-health -->";
            const down = [];
            const sites = {};

            for (const m of members) {
              const ctrl = new AbortController();
              const timer = setTimeout(() => ctrl.abort(), 15000);
              try {
                const res = await fetch(m.url, {
                  method: "GET", redirect: "follow", signal: ctrl.signal,
                  headers: { "user-agent": "larpring-health-check" },
                });
                sites[m.name] = res.ok ? "up" : "down";
                if (!res.ok) down.push(`**${m.name}** — ${m.url} (HTTP ${res.status})`);
              } catch (e) {
                sites[m.name] = "down";
                down.push(`**${m.name}** — ${m.url} (${e.name || "unreachable"})`);
              } finally {
                clearTimeout(timer);
              }
            }

            // status.json — consumed by the homepage for live dots
            const status = { checked: new Date().toISOString(), sites };
            fs.writeFileSync("status.json", JSON.stringify(status, null, 2) + "\n");

            const owner = context.repo.owner, repo = context.repo.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: "open", per_page: 100 });
            const existing = issues.find((i) => i.body && i.body.includes(marker));

            if (down.length) {
              const today = new Date().toISOString().slice(0, 10);
              const body = `${marker}\n\nAs of ${today}, these member sites look down:\n\n${down.map((d) => "- " + d).join("\n")}\n\nRe-run this workflow once they are back, or drop them from \`webring.json\`.`;
              if (existing) await github.rest.issues.update({ owner, repo, issue_number: existing.number, body, state: "open" });
              else await github.rest.issues.create({ owner, repo, title: "⚠ ring health: some sites are down", body });
              core.setFailed(`down: ${down.length}`);
            } else if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body: "All member sites are back up. Closing." });
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: "closed" });
            }

      # Publish status.json to the `status` branch (main is protected, the bot
      # can't push there — but the homepage reads it via raw.githubusercontent).
      - name: publish status.json
        if: always()
        run: |
          test -f status.json || exit 0
          cp status.json /tmp/status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin status 2>/dev/null && git checkout status || git checkout --orphan status
          git rm -rf --cached . >/dev/null 2>&1 || true
          find . -maxdepth 1 ! -name . ! -name .git ! -name status.json -exec rm -rf {} + 2>/dev/null || true
          cp /tmp/status.json status.json
          git add status.json
          git commit -m "health: update status.json" || { echo "no change"; exit 0; }
          git push origin status
