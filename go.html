<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>routing… · vibering</title>
<script>
  (function () { var t; try { t = localStorage.getItem("vibering-theme"); } catch (e) {} document.documentElement.dataset.theme = t || "dark"; })();
</script>
<style>
  :root { --bg:#120e1a; --ink:#efeaf5; --muted:#a294b8; --link:#ff7fb3; }
  :root[data-theme="light"] { --bg:#fbf3e8; --ink:#2a2320; --muted:#8a7d70; --link:#cf2e77; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--bg); color:var(--ink);
    font:16px/1.6 "Segoe UI", ui-rounded, -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; }
  .box { text-align:center; padding:8px 24px; }
  a { color:var(--link); }
  #msg { color:var(--muted); }
</style>
</head>
<body>
<div class="box"><p id="msg">taking you to the next site&hellip;</p></div>
<script src="webring.js"></script>
<script>
  (async function () {
    var msg = document.getElementById("msg");
    var params = new URLSearchParams(location.search);
    try {
      var members = await loadMembers();
      var target = resolveTarget(members, params);
      if (target && target.url) { location.replace(target.url); return; }
      var from = (params.get("from") || "(none)").replace(/[<>&]/g, "");
      msg.innerHTML = 'could not find "' + from + '" in the ring. ' +
        '<a href="./">back to the ring</a> &middot; <a href="random/">random site</a>';
    } catch (e) {
      msg.innerHTML = 'the ring is unreachable. <a href="./">back to the ring</a>';
    }
  })();
</script>
</body>
</html>
