<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>random — loopback</title>
<style>
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0d0e12; color:#e7e8ec;
    font:16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .box { text-align:center; padding:8px 24px; }
  a { color:#ff6b6b; }
  #msg { color:#8b8d99; }
</style>
</head>
<body>
<div class="box"><p id="msg">picking a random site&hellip;</p></div>
<script src="../webring.js"></script>
<script>
  CONFIG.dataUrl = "../webring.json";
  (async function () {
    var msg = document.getElementById("msg");
    try {
      var members = await loadMembers();
      var target = randomMember(members, "");
      if (target && target.url) { location.replace(target.url); return; }
      msg.innerHTML = 'the ring is empty. <a href="../">back to the ring</a>';
    } catch (e) {
      msg.innerHTML = 'the ring is unreachable. <a href="../">back to the ring</a>';
    }
  })();
</script>
</body>
</html>
